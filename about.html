<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About — THE CRTV HUB</title>
<link rel="icon" href="assets/favicon.png" type="image/png">
<link rel="stylesheet" href="styles.css">
<style>
/* About page sections — all 100vh, 50/50, navy left + image right */
.about-section {
  display: flex; flex-direction: row; min-height: 100vh; overflow: hidden;
}
.about-section.reverse { flex-direction: row-reverse; }
.about-left {
  width: 50%; background: #001138;
  display: flex; flex-direction: column; justify-content: center;
  gap: 20px; padding: 50px;
}
.about-right {
  width: 50%; min-height: 500px; position: relative; overflow: hidden;
}
.about-right img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
}
.about-h {
  font-family: 'StrechPro', sans-serif; font-size: 45px; font-weight: 600;
  text-transform: uppercase; color: #1076F8; line-height: 1.05;
  max-width: 383px; margin: 0;
}
.about-quote {
  font-family: 'StrechPro', sans-serif; font-size: 18px; font-weight: 600;
  color: #fff; margin: 0;
}
.about-body {
  font-family: 'MadeOuter', sans-serif; font-size: 15px; font-weight: 400;
  letter-spacing: 0.9px; color: rgba(255,255,255,0.85); line-height: 1.8; margin: 0;
}
@media (max-width: 900px) {
  .about-section, .about-section.reverse { flex-direction: column; }
  .about-left, .about-right { width: 100%; }
  .about-right { min-height: 400px; }
  .about-left { padding: 50px 30px; }
  .about-h { font-size: 30px; }
}
</style>
</head>

</footer>

<script>
/* LOGO CLICK */
(function(){ var l=document.getElementById("nav-logo"); if(l) l.style.cursor="pointer"; })();
/* NAV */
window.addEventListener('scroll',()=>{ document.getElementById('nav-outer').classList.toggle('scrolled',window.scrollY>60); });
document.getElementById('nav-burger').addEventListener('click',()=>{ document.getElementById('mobile-nav').classList.add('open'); });
document.getElementById('mob-close').addEventListener('click',()=>{ document.getElementById('mobile-nav').classList.remove('open'); });
/* LOGO CLICK — re-triggers preloader */
(function(){
  const logo = document.getElementById('nav-logo');
  if(!logo) return;
  logo.addEventListener('click', function(e){
    e.preventDefault();
    // Re-create and show preloader
    const existing = document.getElementById('preloader');
    if(existing) existing.remove();
    const p = document.createElement('div');
    p.id = 'preloader';
    p.innerHTML = '<div class="preloader-inner"><div id="preloader-circle" role="button" tabindex="0" aria-label="Enter"><img id="preloader-logo" src="assets/logo.png" alt="CRTV Hub"></div><p id="preloader-instruction">Click to enter</p></div>';
    document.body.appendChild(p);
    setTimeout(()=>p.classList.add('show-logo'),50);
    let done=false;
    const circle=p.querySelector('#preloader-circle');
    function playClick(){
      try{
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        const osc=ctx.createOscillator(); const gain=ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(800,ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200,ctx.currentTime+0.08);
        gain.gain.setValueAtTime(0.4,ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.1);
      }catch(e){}
    }
    function exit(){
      if(done)return; done=true;
      playClick();
      circle.style.pointerEvents='none';
      p.classList.add('slide-exit');
      setTimeout(()=>{ p.classList.add('fade-out'); setTimeout(()=>p.remove(),400); },900);
    }
    circle.addEventListener('click',exit);
    circle.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' ')exit(); });
  });
})();
</script>
</body>
</html>
